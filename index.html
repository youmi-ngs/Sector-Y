          <!-- PC用ヒーロー -->
          <div id="boot-sequence">
            <div class="terminal" id="terminal">
              <p class="command" data-text="SECTOR Y // TERMINAL O{RAND}"></p>
              <p class="command" data-text="&quot;UNKNOWN&quot; ATTEMPTS CONNECTION"></p>
              <p class="command" data-text="NO CREATOR DETECTED GUIDANCE WILL PROCEED AUTOMATICALLY"></p>
              <br>
              <p class="command"  data-text="THIS UNIVERSE IS FOR OBSERVING THE WORLD OF YOUMI"></p>
              <br>
              <p class="log" data-text="LOG: &quot;UNKNOWN&quot; IS VISITING SECTOR_Y"></p>
              <br>
              <p class="system"  data-text="CONNECTION STABLE"></p>
              <p class="system"  data-text="TERMINAL ACTIVE"></p>
              <p class="system"  data-text="ORBIT SYNC OK"></p>
              <p class="system"  data-text="READY..."></p>
              <br>
              <p class="system"  data-text="I AM MASTER CONTROL PROGRAM"></p>
              <p class="system"  data-text="WHO ARE YOU?"></p>
              <p class="unknown" data-text="{NAME}"></p>
              <p class="system"  data-text="HELLO, {NAME}"></p>
              <br>
              <p class="system"  data-text="OBSERVE SECTOR_Y? Y/N"></p>
              <p class="unknown" data-text="{YN}"></p>
              <br>
              <p class="system"  data-text="WELCOME TO SECTOR_Y"></p>
              <p class="system"  data-text="CATCH ANY PLANET TO OBSERVE"></p>
              <br>
              <p class="log"  data-text="LOG: OBSERVING SECTOR_Y"></p>
              <br>
              <p class="system"  data-text="THE CREATOR NAMED THE BLUE PLANET: CORE"></p>
              <p class="system"  data-text="THEY SAID IT IS THE CENTER OF THE UNIVERSE"></p>
              <br>
              <p class="system"  data-text="THE CREATOR NAMED THE GREEN PLANET: GALLERY"></p>
              <p class="system"  data-text="THEY SAID IT IS A STORAGE OF MEMORIES"></p>
              <br>
              <p class="system"  data-text="THE CREATOR NAMED THE PURPLE PLANET SPARKLE"></p>
              <p class="system"  data-text="THEY SAID IT IS THE TRAIL OF HER JOURNEY"></p>
              <br>
              <p class="system"  data-text="ENJOY TO OBSERVE"></p>
              <p class="system"  data-text="END OF LINE"></p>
              <br>
            </div>

          <script>
            document.addEventListener("DOMContentLoaded", function () {
                  //　ハンバーガー
                  const hamburger = document.querySelector(".hamburger");
                  const topNav = document.querySelector(".top-nav");

                  hamburger.addEventListener("click", function () {
                    hamburger.classList.toggle("open");
                    topNav.classList.toggle("open");
                  });
            });

            (() => {
              // -------- 参照取得 --------
              const term = document.getElementById('terminal');
              if (!term) return;
              const uw = document.getElementById('universe-wrapper');

              // -------- ブートシーケンス完了チェック --------
              const bootCompleted = sessionStorage.getItem('sy_boot_completed');
              const NAME = sessionStorage.getItem('sy_observer_name') || 'UNKNOWN';

              if (bootCompleted === 'true') {
                // 既にブートシーケンス完了済み → 直接宇宙を表示
                if (uw) {
                  uw.classList.remove('hidden');
                  uw.classList.add('visible');
                }

                // ターミナルに完了済みの内容を表示
                const lines = Array.from(term.querySelectorAll('[data-text]'));
                const RAND = String(Math.ceil(Math.random() * 9));
                lines.forEach(el => {
                  let text = (el.dataset.text || '')
                    .replaceAll('{RAND}', RAND)
                    .replaceAll('{NAME}', NAME)
                    .replaceAll('{YN}', 'Y');
                  el.textContent = text;
                });

                // 保存された惑星ログを復元
                const savedLogs = JSON.parse(sessionStorage.getItem('sy_planet_logs') || '[]');
                savedLogs.forEach(logText => {
                  const p = document.createElement('p');
                  p.className = 'log';
                  p.textContent = logText;
                  term.appendChild(p);
                });

                // フォーカスシステムは下で実行されるので、ここではreturnしない
              } else {
                // -------- 設定値 --------
                const CHAR_MS  = 30;   // 1文字の表示間隔（ms）
                const LINE_GAP = 140;  // 行送りの待ち時間（ms）

                const lines = Array.from(term.querySelectorAll('[data-text]')); // data-text 行のみ

                // -------- 状態 --------
                let i = 0;
                let NAME = sessionStorage.getItem('sy_observer_name') || '';
                let YN   = '';

                // 初期置換：{RAND} だけ（{NAME}/{YN} はあとで）
                const RAND = String(Math.ceil(Math.random() * 9));
                lines.forEach(el => el.dataset.text = (el.dataset.text || '').replaceAll('{RAND}', RAND));

                // 共通カーソル
                const caret = document.createElement('span');
                caret.className = 'caret';
                caret.textContent = '▌';

                // -------- ユーティリティ --------
                function typeLine(el, text, done) {
                  el.textContent = '';
                  el.appendChild(caret);
                  let j = 0;
                  (function tick() {
                    caret.before(text[j] || '');
                    j++;
                    if (j <= text.length) setTimeout(tick, CHAR_MS);
                    else setTimeout(done, LINE_GAP);
                  })();
                }

                function placeCaretEnd(el) {
                  const r = document.createRange();
                  r.selectNodeContents(el);
                  r.collapse(false);
                  const s = getSelection();
                  s.removeAllRanges();
                  s.addRange(r);
                }

                function replaceInFollowing(placeholder, value) {
                  for (let k = i + 1; k < lines.length; k++) {
                    lines[k].dataset.text = (lines[k].dataset.text || '').replaceAll(placeholder, value);
                  }
                }

                // -------- 入力：NAME --------
                function askName(el) {
                  el.textContent = '> ';
                  const inp = document.createElement('span');
                  inp.className = 'editable';
                  inp.contentEditable = 'true';
                  inp.dataset.placeholder = ' ';
                  el.appendChild(inp);
                  caret.remove();
                  inp.focus();

                  inp.addEventListener('input', () => {
                    inp.textContent = (inp.textContent || '').toUpperCase();
                    placeCaretEnd(inp);
                  });

                  inp.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                      e.preventDefault();
                      NAME = (inp.textContent || '').trim().toUpperCase() || 'UNKNOWN';
                      sessionStorage.setItem('sy_observer_name', NAME);
                      inp.replaceWith(document.createTextNode(NAME));
                      // 残りの {NAME} を置換
                      replaceInFollowing('{NAME}', NAME);
                      i++; next();
                    }
                  });
                }

                // -------- 入力：Y/N --------
                function askYN(el) {
                  el.textContent = '> ';
                  const inp = document.createElement('span');
                  inp.className = 'editable';
                  inp.contentEditable = 'true';
                  inp.dataset.placeholder = ' ';
                  el.appendChild(inp);
                  caret.remove();
                  inp.focus();

                  inp.addEventListener('input', () => {
                    let v = (inp.textContent || '').toUpperCase().replace(/[^YN]/g, '');
                    inp.textContent = v.slice(0, 1);
                    placeCaretEnd(inp);
                  });

                  inp.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                      e.preventDefault();
                      YN = (inp.textContent || '').trim().toUpperCase() || 'N';

                      // 今の行を「A: Y」形式で確定（{YN} 置換）
                      inp.replaceWith(document.createTextNode(YN));
                      el.textContent = el.textContent.replace('{YN}', YN);

                      // 後続行の {YN} も反映
                      replaceInFollowing('{YN}', YN);

                      if (YN === 'N') {
                        // --- 切断ルート：GOOD BYE → 空行 → ENDED SIGNAL → 再接続ボタン ---
                        const bye = document.createElement('p');
                        bye.className = 'system bad';
                        bye.dataset.text = 'GOOD BYE';

                        const spacer = document.createElement('br');  // 空行
                        spacer.className = 'spacer';
                        spacer.textContent = '';

                        const end = document.createElement('p');
                        end.className = 'command';
                        end.dataset.text = 'ENDED SIGNAL FROM SYSTEM';

                        const spacer2 = document.createElement('br');
                        spacer2.className = 'spacer';

                        const retryContainer = document.createElement('p');
                        retryContainer.className = 'system';
                        retryContainer.style.marginTop = '1em';

                        const retryBtn = document.createElement('button');
                        retryBtn.textContent = '[ RETRY CONNECTION ]';
                        retryBtn.style.cssText = 'background:none;border:1px solid #7dcdff;color:#7dcdff;padding:0.5em 1em;cursor:pointer;font-family:inherit;font-size:inherit;letter-spacing:0.05em;';
                        retryBtn.addEventListener('click', () => {
                          sessionStorage.clear();
                          location.reload();
                        });
                        retryBtn.addEventListener('mouseenter', () => {
                          retryBtn.style.background = 'rgba(125, 205, 255, 0.2)';
                        });
                        retryBtn.addEventListener('mouseleave', () => {
                          retryBtn.style.background = 'none';
                        });

                        retryContainer.appendChild(retryBtn);

                        // lines 配列は bye と end の2行に置換（spacerはDOMにのみ挿入）
                        lines.splice(i + 1, lines.length - (i + 1), bye, end);

                        // DOMは bye → spacer → end → spacer2 → retryContainer の順
                        el.parentNode.insertBefore(bye, el.nextSibling);
                        el.parentNode.insertBefore(spacer, bye.nextSibling);
                        el.parentNode.insertBefore(end, spacer.nextSibling);
                        el.parentNode.insertBefore(spacer2, end.nextSibling);
                        el.parentNode.insertBefore(retryContainer, spacer2.nextSibling);

                        i++; next();  // GOOD BYE → ENDED SIGNAL をタイプして終了
                      } else {
                        // --- 観測ルート：宇宙を"即"表示（会話は右に残す） ---
                        if (uw) { uw.classList.remove('hidden'); uw.classList.add('visible'); }
                        // ブートシーケンス完了フラグをセット
                        sessionStorage.setItem('sy_boot_completed', 'true');
                        i++; next();
                      }
                    }
                  });
                }

                // -------- 行送り --------
                function next() {
                  if (i >= lines.length) { caret.remove(); return; }
                  const el = lines[i];

                  // 保険：data-text が無ければ飛ばす
                  if (!el || !el.dataset || !el.dataset.text) { i++; next(); return; }

                  const text = el.dataset.text || '';

                  if (text === '{NAME}') { askName(el); return; }
                  if (text.includes('{YN}'))            { askYN(el);   return; }

                  typeLine(el, text, () => { i++; next(); });
                }

                // スタート
                next();
              }

              // === 惑星フォーカスシステム ===
              (() => {
                const universe = document.getElementById('universe');
                const terminal = document.getElementById('terminal');
                const focusedBackground = document.getElementById('focused-background');
                const focusedContainer = document.getElementById('focused-planet-container');
                const focusedImg = document.getElementById('focused-planet-img');
                let currentPlanet = null;
                let currentLinksContainer = null;

                // ターミナルにログ追加
                function addLog(planetName) {
                  if (!terminal) return;
                  const observerName = sessionStorage.getItem('sy_observer_name') || 'UNKNOWN';
                  const logText = `LOG: "${observerName}" CAUGHT PLANET: ${planetName}`;
                  const p = document.createElement('p');
                  p.className = 'log';
                  p.textContent = logText;
                  terminal.appendChild(p);
                  terminal.scrollTop = terminal.scrollHeight;

                  // sessionStorageに保存
                  const savedLogs = JSON.parse(sessionStorage.getItem('sy_planet_logs') || '[]');
                  savedLogs.push(logText);
                  sessionStorage.setItem('sy_planet_logs', JSON.stringify(savedLogs));
                }

                // フォーカス解除
                function resetFocus() {
                  if (!currentPlanet) return;
                  universe.classList.remove('focus-mode');
                  focusedBackground.classList.add('hidden');
                  focusedContainer.classList.add('hidden');
                  if (currentLinksContainer) {
                    currentLinksContainer.classList.add('hidden');
                    currentLinksContainer = null;
                  }
                  currentPlanet = null;
                }

                // 惑星クリックイベント
                document.querySelectorAll('.planet').forEach(planet => {
                  planet.addEventListener('click', (e) => {
                    e.stopPropagation();

                    // 同じ惑星を再クリック → 解除
                    if (currentPlanet === planet) {
                      resetFocus();
                      return;
                    }

                    // 前のフォーカスを解除
                    if (currentPlanet) resetFocus();

                    // 新しくフォーカス
                    currentPlanet = planet;
                    const planetImage = planet.dataset.image;
                    const planetName = (planet.dataset.name || 'UNKNOWN').toUpperCase();
                    const linksId = planet.dataset.linksId;

                    // 画像を設定して表示
                    focusedImg.src = planetImage;
                    universe.classList.add('focus-mode');
                    focusedBackground.classList.remove('hidden');
                    focusedContainer.classList.remove('hidden');

                    // リンク表示
                    if (linksId) {
                      currentLinksContainer = document.getElementById(linksId);
                      if (currentLinksContainer) {
                        currentLinksContainer.classList.remove('hidden');
                      }
                    }

                    // ログ追加
                    addLog(planetName);
                  });
                });

                // 背景クリックで解除
                focusedBackground.addEventListener('click', () => {
                  resetFocus();
                });

                // 画像クリックで解除
                focusedImg.addEventListener('click', () => {
                  resetFocus();
                });
              })();
            })();
          </script>
