          <!-- モバイル用ヒーロー -->
          <div class="mobile-hero"></div>

          <!-- PC用ヒーロー -->
          <div id="boot-sequence">
            <div class="terminal" id="terminal">
              <p class="command" data-text="SECTOR Y // TERMINAL 0{RAND}"></p>
              <p class="command" data-text="&quot;UNKNOWN&quot; CONNECTION ATTEMPT"></p>
              <p class="command" data-text="NO CREATOR DETECTED — GUIDANCE WILL PROCEED AUTOMATICALLY"></p>
              <br>
              <p class="command"  data-text="THIS UNIVERSE IS FOR OBSERVING THE WORLD OF YOUMI"></p>
              <br>
              <p class="log" data-text="LOG: &quot;UNKNOWN&quot; IS VISITING SECTOR_Y"></p>
              <br>
              <p class="system"  data-text="CONNECTION STABLE"></p>
              <p class="system"  data-text="TERMINAL ACTIVE"></p>
              <p class="system"  data-text="ORBIT SYNC OK"></p>
              <p class="system"  data-text="READY..."></p>
              <br>
              <p class="system"  data-text="I AM MNEME"></p>
              <p class="system"  data-text="MASTER CONTROL PROGRAM"></p>
              <p class="system"  data-text="WHO ARE YOU?"></p>
              <p class="unknown" data-text="{NAME}"></p>
              <p class="system"  data-text="HELLO, {NAME}"></p>
              <br>
              <p class="system"  data-text="OBSERVE SECTOR_Y? Y/N"></p>
              <p class="unknown" data-text="{YN}"></p>
              <br>
              <p class="system"  data-text="LISTEN TO THE UNIVERSE? Y/N"></p>
              <p class="unknown" data-text="{LISTEN}"></p>
              <br>
              <p class="system"  data-text="WELCOME TO SECTOR_Y"></p>
              <p class="system"  data-text="CATCH ANY PLANET TO OBSERVE"></p>
              <br>
              <p class="log"  data-text="LOG: OBSERVING SECTOR_Y"></p>
              <br>
              <p class="system"  data-text="NEED PLANETS INFO? Y/N"></p>
              <p class="unknown" data-text="{PLANET_INFO}"></p>
              <br>
            </div>
          </div>

          <script>
            document.addEventListener("DOMContentLoaded", function () {
                  //　ハンバーガー
                  const hamburger = document.querySelector(".hamburger");
                  const topNav = document.querySelector(".top-nav");

                  hamburger.addEventListener("click", function () {
                    hamburger.classList.toggle("open");
                    topNav.classList.toggle("open");
                  });
            });

            (() => {
              // -------- 参照取得 --------
              const term = document.getElementById('terminal');
              if (!term) return;
              const uw = document.getElementById('universe-wrapper');

              // -------- 宇宙表示のアニメーション --------
              function showUniverse() {
                if (!uw) return;
                uw.classList.remove('hidden');
                uw.style.opacity = '0';
                uw.style.transform = 'scale(0.9)';
                uw.classList.add('visible');

                // アニメーション開始
                setTimeout(() => {
                  uw.style.transition = 'opacity 0.8s ease, transform 0.8s ease';
                  uw.style.opacity = '1';
                  uw.style.transform = 'scale(1)';
                }, 50);
              }

              // -------- ブートシーケンス完了チェック --------
              const bootCompleted = sessionStorage.getItem('sy_boot_completed');
              const NAME = sessionStorage.getItem('sy_observer_name') || 'UNKNOWN';
              const isCreator = sessionStorage.getItem('sy_is_creator') === 'true';

              if (bootCompleted === 'true') {
                // 既にブートシーケンス完了済み → 直接宇宙を表示
                showUniverse();

                // ターミナルに完了済みの内容を表示
                const lines = Array.from(term.querySelectorAll('[data-text]'));
                const RAND = String(Math.ceil(Math.random() * 9));
                lines.forEach(el => {
                  let text = (el.dataset.text || '')
                    .replaceAll('{RAND}', RAND);

                  // {NAME}の行は"> NAME"形式で表示
                  if (text === '{NAME}') {
                    el.textContent = '> ' + NAME;
                    return;
                  }

                  // YOUMIの場合、HELLO メッセージを変更
                  if (NAME === 'YOUMI' && text === 'HELLO, {NAME}') {
                    el.textContent = 'WELCOME BACK, CREATOR.';
                    return;
                  }

                  // クリエイターの場合、通常の質問を非表示
                  if (isCreator && (
                      text === 'OBSERVE SECTOR_Y? Y/N' ||
                      text === '{YN}' ||
                      text === 'LISTEN TO THE UNIVERSE? Y/N' ||
                      text === '{LISTEN}' ||
                      text === 'CATCH ANY PLANET TO OBSERVE' ||
                      text === 'LOG: OBSERVING SECTOR_Y' ||
                      text === 'NEED PLANETS INFO? Y/N' ||
                      text === '{PLANET_INFO}'
                  )) {
                    el.style.display = 'none';
                    return;
                  }

                  // {YN}を含む行は"> Y"形式で表示
                  if (text.includes('{YN}')) {
                    el.textContent = '> Y';
                    return;
                  }

                  // {LISTEN}の行は、保存された回答で置き換え
                  if (text === '{LISTEN}') {
                    const listenAnswer = sessionStorage.getItem('sy_listen') || '';
                    if (listenAnswer) {
                      el.textContent = '> ' + listenAnswer;
                    } else {
                      el.style.display = 'none';
                    }
                    return;
                  }

                  // {PLANET_INFO}の行は、保存された回答で置き換え
                  if (text === '{PLANET_INFO}') {
                    const planetAnswer = sessionStorage.getItem('sy_planet_info') || '';
                    if (planetAnswer) {
                      el.textContent = '> ' + planetAnswer;
                    } else {
                      el.style.display = 'none';
                    }
                    return;
                  }

                  // {NAME}を置換
                  text = text.replaceAll('{NAME}', NAME);

                  el.textContent = text;
                });

                // クリエイター専用メッセージの復元
                if (isCreator) {
                  const helloEl = Array.from(term.querySelectorAll('p')).find(p => p.textContent === 'WELCOME BACK, CREATOR.');
                  if (helloEl) {
                    const br1 = document.createElement('br');
                    const welcome = document.createElement('p');
                    welcome.className = 'system';
                    welcome.textContent = 'WELCOME TO SECTOR_Y';
                    const enjoy = document.createElement('p');
                    enjoy.className = 'system';
                    enjoy.textContent = 'ENJOY BUILDING';
                    const br2 = document.createElement('br');
                    const endLine = document.createElement('p');
                    endLine.className = 'system';
                    endLine.textContent = 'END OF LINE';
                    const br3 = document.createElement('br');

                    helloEl.parentNode.insertBefore(br1, helloEl.nextSibling);
                    br1.parentNode.insertBefore(welcome, br1.nextSibling);
                    welcome.parentNode.insertBefore(enjoy, welcome.nextSibling);
                    enjoy.parentNode.insertBefore(br2, enjoy.nextSibling);
                    br2.parentNode.insertBefore(endLine, br2.nextSibling);
                    endLine.parentNode.insertBefore(br3, endLine.nextSibling);
                  }
                }

                // 惑星情報の復元（クリエイター以外）
                const planetAnswer = sessionStorage.getItem('sy_planet_info');
                if (planetAnswer && !isCreator) {
                  const planetInfoEl = term.querySelector('[data-text="{PLANET_INFO}"]');
                  if (planetInfoEl && planetAnswer === 'Y') {
                    // Yの場合：惑星情報を追加
                    const br1 = document.createElement('br');
                    planetInfoEl.parentNode.insertBefore(br1, planetInfoEl.nextSibling);

                    const info = [
                      'THE CREATOR NAMED THE BLUE PLANET: CORE',
                      'THEY SAID IT IS THE CENTER OF THE UNIVERSE',
                      '',
                      'THE CREATOR NAMED THE GREEN PLANET: GALLERY',
                      'THEY SAID IT IS A STORAGE OF MEMORIES',
                      '',
                      'THE CREATOR NAMED THE PURPLE PLANET: SPARKLE',
                      'THEY SAID IT IS THE TRAIL OF HER JOURNEY',
                      '',
                      'THE PLANET IN THE CENTER IS THE EXIT',
                      'CATCH IT TO LEAVE',
                      '',
                      'ENJOY TO OBSERVE',
                      'END OF LINE'
                    ];

                    let lastEl = br1;
                    info.forEach(text => {
                      if (text === '') {
                        const br = document.createElement('br');
                        lastEl.parentNode.insertBefore(br, lastEl.nextSibling);
                        lastEl = br;
                      } else {
                        const p = document.createElement('p');
                        p.className = 'system';
                        p.textContent = text;
                        lastEl.parentNode.insertBefore(p, lastEl.nextSibling);
                        lastEl = p;
                      }
                    });
                  } else if (planetInfoEl && planetAnswer === 'N') {
                    // Nの場合：OKAY メッセージを追加
                    const br1 = document.createElement('br');
                    planetInfoEl.parentNode.insertBefore(br1, planetInfoEl.nextSibling);

                    const okay = document.createElement('p');
                    okay.className = 'system';
                    okay.textContent = 'OKAY. ENJOY TO OBSERVE';
                    br1.parentNode.insertBefore(okay, br1.nextSibling);

                    const end = document.createElement('p');
                    end.className = 'system';
                    end.textContent = 'END OF LINE';
                    okay.parentNode.insertBefore(end, okay.nextSibling);

                    const br3 = document.createElement('br');
                    end.parentNode.insertBefore(br3, end.nextSibling);
                  }
                }

                // 保存された惑星ログを復元
                const savedLogs = JSON.parse(sessionStorage.getItem('sy_planet_logs') || '[]');
                savedLogs.forEach(logText => {
                  const p = document.createElement('p');
                  p.className = 'log';
                  p.textContent = logText;
                  term.appendChild(p);
                });

                // 保存されたEXIT質問のやり取りを復元
                const savedExitConversations = JSON.parse(sessionStorage.getItem('sy_exit_conversations') || '[]');
                savedExitConversations.forEach(conv => {
                  const br1 = document.createElement('br');
                  term.appendChild(br1);

                  const question = document.createElement('p');
                  question.className = 'system';
                  question.textContent = 'WANT TO EXIT? Y/N';
                  term.appendChild(question);

                  const answer = document.createElement('p');
                  answer.className = 'unknown';
                  answer.textContent = '> ' + conv.answer;
                  term.appendChild(answer);

                  const br2 = document.createElement('br');
                  term.appendChild(br2);

                  const response = document.createElement('p');
                  response.className = 'system';
                  response.textContent = conv.answer === 'Y' ? 'EXITING SECTOR_Y...' : 'OKAY. CONTINUE OBSERVING';
                  term.appendChild(response);

                  if (conv.answer === 'N') {
                    const br3 = document.createElement('br');
                    term.appendChild(br3);
                  }
                });

                // フォーカスシステムは下で実行されるので、ここではreturnしない
              } else {
                // -------- 設定値 --------
                const CHAR_MS  = 30;   // 1文字の表示間隔（ms）
                const LINE_GAP = 140;  // 行送りの待ち時間（ms）

                const lines = Array.from(term.querySelectorAll('[data-text]')); // data-text 行のみ

                // -------- 状態 --------
                let i = 0;
                let NAME = sessionStorage.getItem('sy_observer_name') || '';
                let YN   = '';

                // 初期置換：{RAND} だけ（{NAME}/{YN} はあとで）
                const RAND = String(Math.ceil(Math.random() * 9));
                lines.forEach(el => el.dataset.text = (el.dataset.text || '').replaceAll('{RAND}', RAND));

                // 共通カーソル
                const caret = document.createElement('span');
                caret.className = 'caret';
                caret.textContent = '▌';

                // -------- ユーティリティ --------
                function typeLine(el, text, done) {
                  el.textContent = '';
                  el.appendChild(caret);
                  let j = 0;
                  (function tick() {
                    caret.before(text[j] || '');
                    j++;
                    term.scrollTop = term.scrollHeight; // 自動スクロール
                    if (j <= text.length) setTimeout(tick, CHAR_MS);
                    else setTimeout(done, LINE_GAP);
                  })();
                }

                function placeCaretEnd(el) {
                  const r = document.createRange();
                  r.selectNodeContents(el);
                  r.collapse(false);
                  const s = getSelection();
                  s.removeAllRanges();
                  s.addRange(r);
                }

                function replaceInFollowing(placeholder, value) {
                  for (let k = i + 1; k < lines.length; k++) {
                    lines[k].dataset.text = (lines[k].dataset.text || '').replaceAll(placeholder, value);
                  }
                }

                // -------- 入力：NAME --------
                function askName(el) {
                  el.textContent = '> ';
                  const inp = document.createElement('span');
                  inp.className = 'editable';
                  inp.contentEditable = 'true';
                  inp.dataset.placeholder = ' ';
                  el.appendChild(inp);
                  caret.remove();
                  inp.focus();

                  inp.addEventListener('input', () => {
                    inp.textContent = (inp.textContent || '').toUpperCase();
                    placeCaretEnd(inp);
                  });

                  inp.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                      e.preventDefault();
                      NAME = (inp.textContent || '').trim().toUpperCase() || 'UNKNOWN';
                      sessionStorage.setItem('sy_observer_name', NAME);
                      inp.replaceWith(document.createTextNode(NAME));

                      if (NAME === 'YOUMI') {
                        sessionStorage.setItem('sy_is_creator', 'true');
                        // HELLO, {NAME}をWELCOME BACK, CREATOR.に変更し、その後の全要素を非表示
                        for (let k = i + 1; k < lines.length; k++) {
                          if (lines[k].dataset.text && lines[k].dataset.text.includes('HELLO, {NAME}')) {
                            lines[k].dataset.text = 'WELCOME BACK, CREATOR.';
                            // その次の要素から全て非表示
                            let nextEl = lines[k].nextElementSibling;
                            while (nextEl) {
                              nextEl.style.display = 'none';
                              nextEl = nextEl.nextElementSibling;
                            }
                            break;
                          }
                        }
                      } else {
                        replaceInFollowing('{NAME}', NAME);
                      }

                      i++; next();
                    }
                  });
                }

                // -------- 入力：Y/N --------
                function askYN(el) {
                  el.textContent = '> ';
                  const inp = document.createElement('span');
                  inp.className = 'editable';
                  inp.contentEditable = 'true';
                  inp.dataset.placeholder = ' ';
                  el.appendChild(inp);
                  caret.remove();
                  inp.focus();

                  inp.addEventListener('input', () => {
                    let v = (inp.textContent || '').toUpperCase().replace(/[^YN]/g, '');
                    inp.textContent = v.slice(0, 1);
                    placeCaretEnd(inp);
                  });

                  inp.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                      e.preventDefault();
                      YN = (inp.textContent || '').trim().toUpperCase() || 'N';

                      // 今の行を「A: Y」形式で確定（{YN} 置換）
                      inp.replaceWith(document.createTextNode(YN));
                      el.textContent = el.textContent.replace('{YN}', YN);

                      // 後続行の {YN} も反映
                      replaceInFollowing('{YN}', YN);

                      if (YN === 'N') {
                        // --- 切断ルート：GOOD BYE → END OF LINE → 空行 → ENDED SIGNAL → 再接続ボタン ---
                        const bye = document.createElement('p');
                        bye.className = 'system bad';
                        bye.dataset.text = 'GOOD BYE';

                        const endOfLine = document.createElement('p');
                        endOfLine.className = 'system';
                        endOfLine.dataset.text = 'END OF LINE';

                        const spacer = document.createElement('br');  // 空行
                        spacer.className = 'spacer';
                        spacer.textContent = '';

                        const end = document.createElement('p');
                        end.className = 'command';
                        end.dataset.text = 'ENDED SIGNAL FROM MNEME';

                        const spacer2 = document.createElement('br');
                        spacer2.className = 'spacer';

                        const retryContainer = document.createElement('p');
                        retryContainer.className = 'system';
                        retryContainer.style.marginTop = '1em';

                        const retryBtn = document.createElement('button');
                        retryBtn.textContent = '[ RETRY CONNECTION ]';
                        retryBtn.style.cssText = 'background:none;border:1px solid #7dcdff;color:#7dcdff;padding:0.5em 1em;cursor:pointer;font-family:inherit;font-size:inherit;letter-spacing:0.05em;';
                        retryBtn.addEventListener('click', () => {
                          sessionStorage.clear();
                          location.reload();
                        });
                        retryBtn.addEventListener('mouseenter', () => {
                          retryBtn.style.background = 'rgba(125, 205, 255, 0.2)';
                        });
                        retryBtn.addEventListener('mouseleave', () => {
                          retryBtn.style.background = 'none';
                        });

                        retryContainer.appendChild(retryBtn);

                        // lines 配列は bye, endOfLine, end の3行に置換（spacerはDOMにのみ挿入）
                        lines.splice(i + 1, lines.length - (i + 1), bye, endOfLine, end);

                        // DOMは bye → endOfLine → spacer → end → spacer2 → retryContainer の順
                        el.parentNode.insertBefore(bye, el.nextSibling);
                        el.parentNode.insertBefore(endOfLine, bye.nextSibling);
                        el.parentNode.insertBefore(spacer, endOfLine.nextSibling);
                        el.parentNode.insertBefore(end, spacer.nextSibling);
                        el.parentNode.insertBefore(spacer2, end.nextSibling);
                        el.parentNode.insertBefore(retryContainer, spacer2.nextSibling);

                        i++; next();  // GOOD BYE → END OF LINE → ENDED SIGNAL をタイプして終了
                      } else {
                        // --- 観測ルート：宇宙を"即"表示（会話は右に残す） ---
                        showUniverse();
                        // ブートシーケンス完了フラグをセット
                        sessionStorage.setItem('sy_boot_completed', 'true');
                        i++; next();
                      }
                    }
                  });
                }

                // -------- 入力：音楽 Y/N --------
                function askListen(el) {
                  el.textContent = '> ';
                  const inp = document.createElement('span');
                  inp.className = 'editable';
                  inp.contentEditable = 'true';
                  inp.dataset.placeholder = ' ';
                  el.appendChild(inp);
                  caret.remove();
                  inp.focus();

                  inp.addEventListener('input', () => {
                    let v = (inp.textContent || '').toUpperCase().replace(/[^YN]/g, '');
                    inp.textContent = v.slice(0, 1);
                    placeCaretEnd(inp);
                  });

                  inp.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                      e.preventDefault();
                      const answer = (inp.textContent || '').trim().toUpperCase() || 'N';
                      inp.replaceWith(document.createTextNode(answer));

                      // 回答をsessionStorageに保存
                      sessionStorage.setItem('sy_listen', answer);

                      if (answer === 'Y') {
                        // BGMを再生
                        const audio = document.getElementById('bgm');
                        const btn = document.getElementById('bgm-toggle');
                        if (audio && btn) {
                          audio.play().then(() => {
                            btn.classList.add('playing');
                            localStorage.setItem('sy_bgm_playing', 'true');
                          }).catch(() => {});
                        }
                      }

                      i++; next();
                    }
                  });
                }

                // -------- 入力：惑星情報 Y/N --------
                function askPlanetInfo(el) {
                  el.textContent = '> ';
                  const inp = document.createElement('span');
                  inp.className = 'editable';
                  inp.contentEditable = 'true';
                  inp.dataset.placeholder = ' ';
                  el.appendChild(inp);
                  caret.remove();
                  inp.focus();

                  inp.addEventListener('input', () => {
                    let v = (inp.textContent || '').toUpperCase().replace(/[^YN]/g, '');
                    inp.textContent = v.slice(0, 1);
                    placeCaretEnd(inp);
                  });

                  inp.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                      e.preventDefault();
                      const answer = (inp.textContent || '').trim().toUpperCase() || 'N';
                      inp.replaceWith(document.createTextNode(answer));

                      // 回答をsessionStorageに保存
                      sessionStorage.setItem('sy_planet_info', answer);

                      if (answer === 'Y') {
                        // 空行を追加
                        const firstBr = document.createElement('br');
                        el.parentNode.insertBefore(firstBr, el.nextSibling);

                        // 惑星情報を表示
                        const info = [
                          { text: 'THE CREATOR NAMED THE BLUE PLANET: CORE', br: false },
                          { text: 'THEY SAID IT IS THE CENTER OF THE UNIVERSE', br: true },
                          { text: 'THE CREATOR NAMED THE GREEN PLANET: GALLERY', br: false },
                          { text: 'THEY SAID IT IS A STORAGE OF MEMORIES', br: true },
                          { text: 'THE CREATOR NAMED THE PURPLE: PLANET SPARKLE', br: false },
                          { text: 'THEY SAID IT IS THE TRAIL OF HER JOURNEY', br: true },
                          { text: 'THE PLANET IN THE CENTER IS THE EXIT', br: false },
                          { text: 'CATCH IT TO LEAVE', br: true },
                          { text: 'ENJOY TO OBSERVE', br: false },
                          { text: 'END OF LINE', br: true }
                        ];

                        let lastElement = firstBr;
                        info.forEach(item => {
                          const p = document.createElement('p');
                          p.className = 'system';
                          p.dataset.text = item.text;
                          lines.push(p);
                          lastElement.parentNode.insertBefore(p, lastElement.nextSibling);
                          lastElement = p;
                          if (item.br) {
                            const br = document.createElement('br');
                            lastElement.parentNode.insertBefore(br, lastElement.nextSibling);
                            lastElement = br;
                          }
                        });
                      } else {
                        // 惑星情報をスキップ
                        const firstBr = document.createElement('br');
                        el.parentNode.insertBefore(firstBr, el.nextSibling);

                        const okay = document.createElement('p');
                        okay.className = 'system';
                        okay.dataset.text = 'OKAY. ENJOY TO OBSERVE';
                        lines.push(okay);
                        firstBr.parentNode.insertBefore(okay, firstBr.nextSibling);

                        const end = document.createElement('p');
                        end.className = 'system';
                        end.dataset.text = 'END OF LINE';
                        lines.push(end);
                        okay.parentNode.insertBefore(end, okay.nextSibling);

                        const br2 = document.createElement('br');
                        end.parentNode.insertBefore(br2, end.nextSibling);
                      }

                      i++; next();
                    }
                  });
                }

                // -------- 行送り --------
                function next() {
                  if (i >= lines.length) { caret.remove(); return; }
                  const el = lines[i];

                  // 保険：data-text が無ければ飛ばす
                  if (!el || !el.dataset || !el.dataset.text) { i++; next(); return; }

                  // 非表示の行をスキップ
                  if (el.style.display === 'none') {
                    i++;
                    next();
                    return;
                  }

                  const text = el.dataset.text || '';

                  if (text === '{NAME}') { askName(el); return; }
                  if (text.includes('{YN}'))            { askYN(el);   return; }
                  if (text === '{LISTEN}')              { askListen(el); return; }
                  if (text === '{PLANET_INFO}')         { askPlanetInfo(el); return; }

                  // クリエイターの場合、WELCOME BACK表示後に音楽質問→専用メッセージを追加
                  if (text === 'WELCOME BACK, CREATOR.' && sessionStorage.getItem('sy_is_creator') === 'true') {
                    typeLine(el, text, () => {
                      const br1 = document.createElement('br');
                      term.appendChild(br1);

                      // 音楽の質問を表示
                      const listenQ = document.createElement('p');
                      listenQ.className = 'system';
                      term.appendChild(listenQ);
                      typeLine(listenQ, 'LISTEN TO THE UNIVERSE? Y/N', () => {
                        caret.remove();

                        // 入力欄を作成
                        const listenA = document.createElement('p');
                        listenA.className = 'unknown';
                        listenA.textContent = '> ';
                        const inp = document.createElement('span');
                        inp.className = 'editable';
                        inp.contentEditable = 'true';
                        inp.dataset.placeholder = ' ';
                        listenA.appendChild(inp);
                        term.appendChild(listenA);
                        inp.focus();

                        inp.addEventListener('input', () => {
                          let v = (inp.textContent || '').toUpperCase().replace(/[^YN]/g, '');
                          inp.textContent = v.slice(0, 1);
                          placeCaretEnd(inp);
                        });

                        inp.addEventListener('keydown', (e) => {
                          if (e.key === 'Enter') {
                            e.preventDefault();
                            const answer = (inp.textContent || '').trim().toUpperCase() || 'N';
                            inp.replaceWith(document.createTextNode(answer));
                            sessionStorage.setItem('sy_listen', answer);

                            if (answer === 'Y') {
                              const audio = document.getElementById('bgm');
                              const btn = document.getElementById('bgm-toggle');
                              if (audio && btn) {
                                audio.play().then(() => {
                                  btn.classList.add('playing');
                                  localStorage.setItem('sy_bgm_playing', 'true');
                                }).catch(() => {});
                              }
                            }

                            const br2 = document.createElement('br');
                            term.appendChild(br2);

                            const enjoy = document.createElement('p');
                            enjoy.className = 'system';
                            term.appendChild(enjoy);
                            typeLine(enjoy, 'ENJOY BUILDING', () => {

                              const end = document.createElement('p');
                              end.className = 'system';
                              term.appendChild(end);
                              typeLine(end, 'END OF LINE', () => {

                                const br3 = document.createElement('br');
                                term.appendChild(br3);
                                caret.remove();

                                sessionStorage.setItem('sy_boot_completed', 'true');
                                showUniverse();
                              });
                            });
                          }
                        });
                      });
                    });
                    return;
                  }

                  typeLine(el, text, () => { i++; next(); });
                }

                // スタート
                next();
              }

              // === 惑星フォーカスシステム ===
              (() => {
                const universe = document.getElementById('universe');
                const terminal = document.getElementById('terminal');
                const focusedBackground = document.getElementById('focused-background');
                const focusedContainer = document.getElementById('focused-planet-container');
                const focusedImg = document.getElementById('focused-planet-img');
                let currentPlanet = null;
                let currentLinksContainer = null;

                // ターミナルにログ追加
                function addLog(planetName) {
                  if (!terminal) return;
                  const observerName = sessionStorage.getItem('sy_observer_name') || 'UNKNOWN';
                  const logText = `LOG: "${observerName}" CAUGHT PLANET: ${planetName}`;
                  const p = document.createElement('p');
                  p.className = 'log';
                  p.textContent = logText;
                  terminal.appendChild(p);
                  terminal.scrollTop = terminal.scrollHeight;

                  // sessionStorageに保存
                  const savedLogs = JSON.parse(sessionStorage.getItem('sy_planet_logs') || '[]');
                  savedLogs.push(logText);
                  sessionStorage.setItem('sy_planet_logs', JSON.stringify(savedLogs));
                }

                // フォーカス解除
                function resetFocus() {
                  if (!currentPlanet) return;
                  universe.classList.remove('focus-mode');
                  focusedBackground.classList.add('hidden');
                  focusedContainer.classList.add('hidden');
                  if (currentLinksContainer) {
                    currentLinksContainer.classList.add('hidden');
                    currentLinksContainer = null;
                  }
                  currentPlanet = null;
                }

                // 惑星クリックイベント
                document.querySelectorAll('.planet').forEach(planet => {
                  planet.addEventListener('click', (e) => {
                    e.stopPropagation();

                    // 同じ惑星を再クリック → 解除
                    if (currentPlanet === planet) {
                      resetFocus();
                      return;
                    }

                    // 前のフォーカスを解除
                    if (currentPlanet) resetFocus();

                    // 新しくフォーカス
                    currentPlanet = planet;
                    const planetImage = planet.dataset.image;
                    const planetName = (planet.dataset.name || 'UNKNOWN').toUpperCase();
                    const linksId = planet.dataset.linksId;

                    // 画像を設定して表示
                    focusedImg.src = planetImage;
                    universe.classList.add('focus-mode');
                    focusedBackground.classList.remove('hidden');
                    focusedContainer.classList.remove('hidden');

                    // リンク表示
                    if (linksId) {
                      currentLinksContainer = document.getElementById(linksId);
                      if (currentLinksContainer) {
                        currentLinksContainer.classList.remove('hidden');
                      }
                    }

                    // ログ追加
                    addLog(planetName);
                  });
                });

                // 背景クリックで解除
                focusedBackground.addEventListener('click', () => {
                  resetFocus();
                });

                // 画像クリックで解除
                focusedImg.addEventListener('click', () => {
                  resetFocus();
                });

                // タイプアニメーション関数（惑星フォーカスシステム用）
                const CHAR_MS = 30;
                const LINE_GAP = 140;
                const caret = document.createElement('span');
                caret.className = 'caret';
                caret.textContent = '▌';

                function typeLineLocal(el, text, done) {
                  el.textContent = '';
                  el.appendChild(caret);
                  let j = 0;
                  (function tick() {
                    caret.before(text[j] || '');
                    j++;
                    terminal.scrollTop = terminal.scrollHeight;
                    if (j <= text.length) setTimeout(tick, CHAR_MS);
                    else setTimeout(done, LINE_GAP);
                  })();
                }

                // 中央の惑星クリックで宇宙から出る確認
                const centerPlanet = document.getElementById('center-planet');
                if (centerPlanet) {
                  centerPlanet.style.cursor = 'pointer';
                  centerPlanet.addEventListener('click', () => {
                    if (!terminal) return;

                    const observerName = sessionStorage.getItem('sy_observer_name') || 'UNKNOWN';

                    // ターミナルにメッセージを追加
                    const br1 = document.createElement('br');
                    terminal.appendChild(br1);

                    const question = document.createElement('p');
                    question.className = 'system';
                    terminal.appendChild(question);

                    // タイプアニメーションで質問を表示し、完了後に入力欄を表示
                    typeLineLocal(question, 'WANT TO EXIT? Y/N', () => {
                      caret.remove();

                      const answer = document.createElement('p');
                      answer.className = 'unknown';
                      answer.textContent = '> ';

                      const inp = document.createElement('span');
                      inp.className = 'editable';
                      inp.contentEditable = 'true';
                      inp.dataset.placeholder = ' ';
                      answer.appendChild(inp);
                      terminal.appendChild(answer);

                      inp.focus();
                      terminal.scrollTop = terminal.scrollHeight;

                    // カーソルを末尾に
                    function placeCaretEnd(el) {
                      const r = document.createRange();
                      r.selectNodeContents(el);
                      r.collapse(false);
                      const s = getSelection();
                      s.removeAllRanges();
                      s.addRange(r);
                    }

                    inp.addEventListener('input', () => {
                      let v = (inp.textContent || '').toUpperCase().replace(/[^YN]/g, '');
                      inp.textContent = v.slice(0, 1);
                      placeCaretEnd(inp);
                    });

                    inp.addEventListener('keydown', (e) => {
                      if (e.key === 'Enter') {
                        e.preventDefault();
                        const choice = (inp.textContent || '').trim().toUpperCase() || 'N';
                        inp.replaceWith(document.createTextNode(choice));

                        const br2 = document.createElement('br');
                        terminal.appendChild(br2);

                        if (choice === 'Y') {
                          // Yの場合：宇宙から出る
                          const exit = document.createElement('p');
                          exit.className = 'system';
                          terminal.appendChild(exit);

                          typeLineLocal(exit, 'EXITING SECTOR_Y...', () => {
                            const goodbye = document.createElement('p');
                            goodbye.className = 'log';
                            terminal.appendChild(goodbye);

                            typeLineLocal(goodbye, `LOG: "${observerName}" LEFT SECTOR_Y`, () => {
                              const br3 = document.createElement('br');
                              terminal.appendChild(br3);

                              const farewell = document.createElement('p');
                              farewell.className = 'system';
                              terminal.appendChild(farewell);

                              typeLineLocal(farewell, 'GOOD BYE', () => {
                                const end = document.createElement('p');
                                end.className = 'system';
                                terminal.appendChild(end);

                                typeLineLocal(end, 'END OF LINE', () => {
                                  caret.remove();
                                  terminal.scrollTop = terminal.scrollHeight;

                                  // 宇宙を非表示にする（アニメーション付き）
                                  const universeWrapper = document.getElementById('universe-wrapper');
                                  if (universeWrapper) {
                                    universeWrapper.style.transition = 'opacity 0.8s ease, transform 0.8s ease';
                                    universeWrapper.style.opacity = '0';
                                    universeWrapper.style.transform = 'scale(0.8)';

                                    setTimeout(() => {
                                      universeWrapper.classList.remove('visible');
                                      universeWrapper.classList.add('hidden');

                                      // 宇宙が消えた後に「ENDED SIGNAL FROM MNEME」と再接続ボタンを表示
                                      const br4 = document.createElement('br');
                                      terminal.appendChild(br4);

                                      const endedSignal = document.createElement('p');
                                      endedSignal.className = 'command';
                                      terminal.appendChild(endedSignal);

                                      typeLineLocal(endedSignal, 'ENDED SIGNAL FROM MNEME', () => {
                                        caret.remove();

                                        const br5 = document.createElement('br');
                                        terminal.appendChild(br5);

                                        const retryContainer = document.createElement('p');
                                        retryContainer.className = 'system';
                                        retryContainer.style.marginTop = '1em';

                                        const retryBtn = document.createElement('button');
                                        retryBtn.textContent = '[ RETRY CONNECTION ]';
                                        retryBtn.style.cssText = 'background:none;border:1px solid #7dcdff;color:#7dcdff;padding:0.5em 1em;cursor:pointer;font-family:inherit;font-size:inherit;letter-spacing:0.05em;';
                                        retryBtn.addEventListener('click', () => {
                                          sessionStorage.clear();
                                          location.reload();
                                        });
                                        retryBtn.addEventListener('mouseenter', () => {
                                          retryBtn.style.background = 'rgba(125, 205, 255, 0.2)';
                                        });
                                        retryBtn.addEventListener('mouseleave', () => {
                                          retryBtn.style.background = 'none';
                                        });

                                        retryContainer.appendChild(retryBtn);
                                        terminal.appendChild(retryContainer);
                                        terminal.scrollTop = terminal.scrollHeight;
                                      });
                                    }, 800);
                                  }

                                  // sessionStorageをクリア
                                  sessionStorage.clear();
                                });
                              });
                            });
                          });
                        } else {
                          // Nの場合：観察を続ける
                          // sessionStorageに保存
                          const exitConvs = JSON.parse(sessionStorage.getItem('sy_exit_conversations') || '[]');
                          exitConvs.push({ answer: 'N' });
                          sessionStorage.setItem('sy_exit_conversations', JSON.stringify(exitConvs));

                          const stay = document.createElement('p');
                          stay.className = 'system';
                          terminal.appendChild(stay);

                          typeLineLocal(stay, 'OKAY. CONTINUE OBSERVING', () => {
                            caret.remove();

                            const br3 = document.createElement('br');
                            terminal.appendChild(br3);

                            terminal.scrollTop = terminal.scrollHeight;
                          });
                        }
                      }
                    });
                    }); // typeLineLocal callback end
                  });
                }
              })();
            })();
          </script>

        <!-- BGM -->
        <audio id="bgm" loop preload="auto">
          <source src="music/bgm.mp3" type="audio/mpeg">
        </audio>
        <button class="bgm-toggle" id="bgm-toggle" aria-label="BGM">
          <span class="icon-play">&#9654;</span>
          <span class="icon-pause">&#10074;&#10074;</span>
        </button>
        <script>
          (() => {
            const audio = document.getElementById('bgm');
            const btn = document.getElementById('bgm-toggle');
            if (!audio || !btn) return;

            const KEY = 'sy_bgm_playing';

            function play() {
              audio.play().then(() => {
                btn.classList.add('playing');
                localStorage.setItem(KEY, 'true');
              }).catch(() => {});
            }

            function pause() {
              audio.pause();
              btn.classList.remove('playing');
              localStorage.setItem(KEY, 'false');
            }

            btn.addEventListener('click', () => {
              if (audio.paused) {
                play();
              } else {
                pause();
              }
            });

            // ページ読み込み時に状態を復元
            if (localStorage.getItem(KEY) === 'true') {
              play();
            }
          })();
        </script>

        </body>
</html>
