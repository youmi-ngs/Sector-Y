        <div id="modal" class="modal" onclick="this.style.display='none'">
            <div class = "modal-content">
                <div class="spinner"></div>
                <img id="modal-image">
                <div class="modal-info">
                    <h2 id="modal-title"></h2>
                    <p id="modal-place"></p>
                    <p id="modal-camera"></p>
                    <p id="modal-desc"></p>
                </div>
            </div>
        </div>


        <script>
            let currentImageIndex = 0;

            function getVisibleContainers() {
                return Array.from(document.querySelectorAll('.image-container'))
                    .filter(container => container.style.display !== 'none');
            }

            const containers = Array.from(document.querySelectorAll('.image-container'));

            const modal = document.getElementById('modal');
            const modalImage = document.getElementById('modal-image');
            const modalTitle = document.getElementById('modal-title');
            const modalPlace = document.getElementById('modal-place');
            const modalDesc = document.getElementById('modal-desc');
            const modalCamera = document.getElementById('modal-camera');
            const modalContent = document.querySelector('.modal-info');

            function showModal(container) {
                document.body.classList.add('modal-open');
                const thumbSrc = container.querySelector('img').src;
                const fullSrc = thumbSrc.replace('thumb/', 'images/');
                modalImage.src = fullSrc;
                modalImage.parentElement.classList.remove('loaded');

                const hasTitle = container.dataset.title && container.dataset.title.trim() !== '';
                const hasPlace= container.dataset.place&& container.dataset.place.trim() !== '';
                const hasCamera = container.dataset.camera && container.dataset.camera.trim() !== '';
                const hasDesc = container.dataset.desc && container.dataset.desc.trim() !== '';

                if (hasTitle || hasPlace || hasCamera || hasDesc) {
                    modalTitle.textContent = hasTitle ? container.dataset.title : '';
                    modalPlace.textContent = hasPlace ? container.dataset.place : '';
                    modalCamera.textContent = hasCamera ? container.dataset.camera : '';
                    modalDesc.textContent = hasDesc ? container.dataset.desc : '';

                    modalContent.style.display = 'block';
                    modalImage.style.maxHeight = '90vh';
                } else {
                    modalContent.style.display = 'none';
                    modalImage.style.maxHeight = '100vh';
                }

                modal.style.display = 'flex';
            }

            function assignClickEvents() {
                const visibleContainers = getVisibleContainers();
                visibleContainers.forEach((container, index) => {
                    container.onclick = () => {
                        currentImageIndex = index;
                        showModal(container);
                    };
                });
            }

            modalImage.addEventListener('load', () => {
                modalImage.parentElement.classList.add('loaded');
            });

            assignClickEvents();

            modal.onclick = function () {
                modal.style.display = 'none';
                document.body.classList.remove('modal-open');
            };

            document.addEventListener("DOMContentLoaded", function () {
                // フィルター関数
                function filterImages() {
                    // 各カテゴリで選択されているタグを取得
                    const selectedPlace = document.querySelector('button[data-category="places"].active')?.dataset.tag;
                    const selectedCharacter = document.querySelector('button[data-category="characters"].active')?.dataset.tag;

                    // 各画像をチェック
                    document.querySelectorAll(".image-container").forEach(container => {
                        const tags = container.dataset.tags.split(" ");

                        // 各カテゴリの条件をチェック
                        const placeMatch = !selectedPlace || selectedPlace === "All" || tags.includes(selectedPlace);
                        const characterMatch = !selectedCharacter || selectedCharacter === "All" || tags.includes(selectedCharacter);

                        // 全ての条件を満たす場合のみ表示
                        container.style.display = (placeMatch && characterMatch) ? "flex" : "none";
                    });

                    // 画像が変わったのでクリックイベントを再割り当て
                    assignClickEvents();
                }

                // タグボタンのクリックイベント
                document.querySelectorAll(".tag-list button").forEach(button => {
                    button.addEventListener("click", () => {
                        const category = button.dataset.category;

                        // 同じカテゴリ内のボタンからactiveを外す
                        document.querySelectorAll(`button[data-category="${category}"]`).forEach(b => {
                            b.classList.remove("active");
                        });

                        // クリックされたボタンにactiveをつける
                        button.classList.add("active");

                        // フィルタリングを実行
                        filterImages();
                    });
                });
            });


            // PC: キーボード矢印キー対応
            document.addEventListener('keydown', (e) => {
                const visible = getVisibleContainers();
                if (modal.style.display === 'flex') {
                    if (e.key === 'ArrowRight') {
                        currentImageIndex = (currentImageIndex + 1) % visible.length;
                        showModal(visible[currentImageIndex]);
                    } else if (e.key === 'ArrowLeft') {
                        currentImageIndex = (currentImageIndex - 1 + visible.length) % visible.length;
                        showModal(visible[currentImageIndex]);
                    } else if (e.key === 'Escape') {
                        modal.style.display = 'none';
                    }
                }
            });

            // スマホ：左右スワイプ対応
            let touchStartX = 0;
            let touchEndX = 0;

            modal.addEventListener('touchstart', (e) => {
                touchStartX = e.changedTouches[0].screenX;
            });

            modal.addEventListener('touchend', (e) => {
                touchEndX = e.changedTouches[0].screenX;
                handleSwipe();
            });

            function handleSwipe() {
                const visible = getVisibleContainers();
                if (touchEndX < touchStartX - 50) {
                    currentImageIndex = (currentImageIndex + 1) % visible.length;
                    showModal(visible[currentImageIndex]);
                }
                if (touchEndX > touchStartX + 50) {
                    currentImageIndex = (currentImageIndex - 1 + visible.length) % visible.length;
                    showModal(visible[currentImageIndex]);
                }
            }

            document.addEventListener("DOMContentLoaded", function () {
                //　ハンバーガー
                const hamburger = document.querySelector(".hamburger");
                const topNav = document.querySelector(".top-nav");

                hamburger.addEventListener("click", function () {
                    hamburger.classList.toggle("open");
                    topNav.classList.toggle("open");
                });
            });

            document.querySelectorAll('.image-container img').forEach(img => {
            const container = img.parentElement;
            if (img.complete) {
                container.classList.add('loaded');
            } else {
                img.addEventListener('load', () => {
                container.classList.add('loaded');
                });
            }
            });
        </script>

        <!-- BGM -->
        <audio id="bgm" loop preload="auto">
          <source src="../music/bgm.mp3" type="audio/mpeg">
        </audio>
        <button class="bgm-toggle" id="bgm-toggle" aria-label="BGM">
          <span class="icon-play">&#9654;</span>
          <span class="icon-pause">&#10074;&#10074;</span>
        </button>
        <script>
          (() => {
            const audio = document.getElementById('bgm');
            const btn = document.getElementById('bgm-toggle');
            if (!audio || !btn) return;

            const KEY = 'sy_bgm_playing';

            function play() {
              audio.play().then(() => {
                btn.classList.add('playing');
                localStorage.setItem(KEY, 'true');
              }).catch(() => {});
            }

            function pause() {
              audio.pause();
              btn.classList.remove('playing');
              localStorage.setItem(KEY, 'false');
            }

            btn.addEventListener('click', () => {
              if (audio.paused) {
                play();
              } else {
                pause();
              }
            });

            if (localStorage.getItem(KEY) === 'true') {
              play();
            }
          })();
        </script>
