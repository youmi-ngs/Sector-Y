        <div id="modal" class="modal" onclick="this.style.display='none'">
            <div class = "modal-content">
                <div class="spinner"></div>
                <img id="modal-image">
                <div class="modal-info">
                    <h2 id="modal-title"></h2>
                    <p id="modal-place"></p>
                    <p id="modal-camera"></p>
                    <p id="modal-desc"></p>
                </div>
            </div>
        </div>


        <script>
            let currentImageIndex = 0;

            function getVisibleContainers() {
                return Array.from(document.querySelectorAll('.image-container'))
                    .filter(container => container.style.display !== 'none');
            }

            const containers = Array.from(document.querySelectorAll('.image-container'));
            
            const modal = document.getElementById('modal');
            const modalImage = document.getElementById('modal-image');
            const modalTitle = document.getElementById('modal-title');
            const modalPlace = document.getElementById('modal-place');
            const modalDesc = document.getElementById('modal-desc');
            const modalCamera = document.getElementById('modal-camera');
            const modalContent = document.querySelector('.modal-info');
            
            function showModal(container) {
                document.body.classList.add('modal-open');
                const thumbSrc = container.querySelector('img').src;
                const fullSrc = thumbSrc.replace('thumb/', 'images/');
                modalImage.src = fullSrc;
                modalImage.parentElement.classList.remove('loaded');
            
                const hasTitle = container.dataset.title && container.dataset.title.trim() !== '';
                const hasPlace= container.dataset.place&& container.dataset.place.trim() !== '';
                const hasCamera = container.dataset.camera && container.dataset.camera.trim() !== '';
                const hasDesc = container.dataset.desc && container.dataset.desc.trim() !== '';
            
                if (hasTitle || hasPlace || hasCamera || hasDesc) {
                    modalTitle.textContent = hasTitle ? container.dataset.title : '';
                    modalPlace.textContent = hasPlace ? container.dataset.place : '';
                    modalCamera.textContent = hasCamera ? container.dataset.camera : '';
                    modalDesc.textContent = hasDesc ? container.dataset.desc : '';
            
                    modalContent.style.display = 'block';
                    modalImage.style.maxHeight = '90vh';
                } else {
                    modalContent.style.display = 'none';
                    modalImage.style.maxHeight = '100vh';
                }
            
                modal.style.display = 'flex';
            }

            function assignClickEvents() {
                const visibleContainers = getVisibleContainers();
                visibleContainers.forEach((container, index) => {
                    container.onclick = () => {
                        currentImageIndex = index;
                        showModal(container);
                    };
                });
            }

            modalImage.addEventListener('load', () => {
                modalImage.parentElement.classList.add('loaded'); 
            });
            
            assignClickEvents();

            modal.onclick = function () {
                modal.style.display = 'none';
                document.body.classList.remove('modal-open');
            };

            document.addEventListener("DOMContentLoaded", function () {
                document.querySelectorAll(".tag-list button").forEach(button => {
                    button.addEventListener("click", () => {
                    const tag = button.dataset.tag;

                    // すべてのボタンから active を外す
                    document.querySelectorAll(".tag-list button").forEach(b => b.classList.remove("active"));

                    // 今クリックされたボタンに active をつける
                    button.classList.add("active");

                    // 絞り込み処理
                    document.querySelectorAll(".image-container").forEach(container => {
                        const tags = container.dataset.tags.split(" ");
                        container.style.display = (tag === "All" || tags.includes(tag)) ? "flex" : "none";
                    });
                    });
                });
            });

            
            // PC: キーボード矢印キー対応
            document.addEventListener('keydown', (e) => {
                const visible = getVisibleContainers();
                if (modal.style.display === 'flex') {
                    if (e.key === 'ArrowRight') {
                        currentImageIndex = (currentImageIndex + 1) % visible.length;
                        showModal(visible[currentImageIndex]);
                    } else if (e.key === 'ArrowLeft') {
                        currentImageIndex = (currentImageIndex - 1 + visible.length) % visible.length;
                        showModal(visible[currentImageIndex]);
                    } else if (e.key === 'Escape') {
                        modal.style.display = 'none';
                    }
                }
            });
            
            // スマホ：左右スワイプ対応
            let touchStartX = 0;
            let touchEndX = 0;
            
            modal.addEventListener('touchstart', (e) => {
                touchStartX = e.changedTouches[0].screenX;
            });
            
            modal.addEventListener('touchend', (e) => {
                touchEndX = e.changedTouches[0].screenX;
                handleSwipe();
            });
            
            function handleSwipe() {
                const visible = getVisibleContainers();
                if (touchEndX < touchStartX - 50) {
                    currentImageIndex = (currentImageIndex + 1) % visible.length;
                    showModal(visible[currentImageIndex]);
                }
                if (touchEndX > touchStartX + 50) {
                    currentImageIndex = (currentImageIndex - 1 + visible.length) % visible.length;
                    showModal(visible[currentImageIndex]);
                }
            }

            document.addEventListener("DOMContentLoaded", function () {
                //　ハンバーガー
                const hamburger = document.querySelector(".hamburger");
                const topNav = document.querySelector(".top-nav");

                hamburger.addEventListener("click", function () {
                    hamburger.classList.toggle("open");
                    topNav.classList.toggle("open");
                });
            });

            document.querySelectorAll('.image-container img').forEach(img => {
            const container = img.parentElement;
            if (img.complete) {
                container.classList.add('loaded');
            } else {
                img.addEventListener('load', () => {
                container.classList.add('loaded');
                });
            }
            });
        </script>
