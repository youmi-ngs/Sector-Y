        <link rel="stylesheet" href="../../style.css"/>
    </head>

            <button class="hamburger" aria-label="メニュー">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <div class="site-title">
                
               <div class="site-logo">
                   <a href="../../index.html">
                        <picture>
                            <source srcset="../../images/logo-light.png" media="(prefers-color-scheme: light)">
                            <source srcset="../../images/logo-dark.png" media="(prefers-color-scheme: dark)">
                            <img src="../../images/logo-dark.png" alt="logo" height="32" />
                        </picture>
                   </a>
                </div>

              <div class="nav-group">
                    <span class="nav-label">Gallery:</span>
                    <a href="../main/main.html">Main</a>
                    <a href="disney.html" class="active">Disney</a>
                    <a href="../daisy/daisy.html">Daisy</a>

                <div class="nav-group">

                    <a href="../../sparkle/trail/trail.html">Trail</a>

                <div class="nav-group">
                  <span class="nav-label">Profile:</span>
                  <a href="../../profile.html">AboutYoumi</a>

        <h1>Gallery / Disney</h1>
        <div class="gallery">
            <div class="image-container"  data-title="" data-place="Tokyo DisneySea, Cafe Portofino" data-camera="Canon EOS R50, 45mm, f6.3, 1/60s, ISO 100">
                <img src="thumb/photo2.jpg">
            </div>
            <div class="image-container" data-title="未来" data-place="Tokyo Disneyland, Tomorrowland" data-camera="Canon EOS R50, 50mm, f1.8, 1/4000s, ISO 100">
                <img src="thumb/photo3.jpg">
            </div>
            <div class="image-container" data-title="パフィーと ハッピー！パルパルーザ！" data-place="Tokyo Disneyland" data-camera="Canon EOS R50, 50mm, f1.8, 1/4000s, ISO 100">
                <img src="thumb/photo4.jpg">
            </div>
        </div>

        <div id="modal" class="modal" onclick="this.style.display='none'">
            <div class = "modal-content">
                <img id="modal-image">
                <div class="modal-info">
                    <h2 id="modal-title"></h2>
                    <p id="modal-place"></p>
                    <p id="modal-camera"></p>
                    <p id="modal-desc"></p>
                </div>
            </div>
        </div>


        <script>
            let currentImageIndex = 0;
            const containers = Array.from(document.querySelectorAll('.image-container'));
            
            const modal = document.getElementById('modal');
            const modalImage = document.getElementById('modal-image');
            const modalTitle = document.getElementById('modal-title');
            const modalPlace = document.getElementById('modal-place');
            const modalDesc = document.getElementById('modal-desc');
            const modalCamera = document.getElementById('modal-camera');
            const modalContent = document.querySelector('.modal-info');
            
            function showModal(container) {
                const thumbSrc = container.querySelector('img').src;
                const fullSrc = thumbSrc.replace('/thumb/', '/images/');
                modalImage.src = fullSrc;
            
                const hasTitle = container.dataset.title && container.dataset.title.trim() !== '';
                const hasPlace= container.dataset.place&& container.dataset.place.trim() !== '';
                const hasCamera = container.dataset.camera && container.dataset.camera.trim() !== '';
                const hasDesc = container.dataset.desc && container.dataset.desc.trim() !== '';
            
                if (hasTitle || hasPlace || hasCamera || hasDesc) {
                    modalTitle.textContent = hasTitle ? container.dataset.title : '';
                    modalPlace.textContent = hasPlace ? container.dataset.place : '';
                    modalCamera.textContent = hasCamera ? container.dataset.camera : '';
                    modalDesc.textContent = hasDesc ? container.dataset.desc : '';
            
                    modalContent.style.display = 'block';
                    modalImage.style.maxHeight = '90vh';
                } else {
                    modalContent.style.display = 'none';
                    modalImage.style.maxHeight = '100vh';
                }
            
                modal.style.display = 'flex';
            }
            
            containers.forEach((container, index) => {
                container.onclick = () => {
                    currentImageIndex = index;
                    showModal(container);
                };
            });
            
            // PC: キーボード矢印キー対応
            document.addEventListener('keydown', (e) => {
                if (modal.style.display === 'flex') {
                    if (e.key === 'ArrowRight') {
                        currentImageIndex = (currentImageIndex + 1) % containers.length;
                        showModal(containers[currentImageIndex]);
                    } else if (e.key === 'ArrowLeft') {
                        currentImageIndex = (currentImageIndex - 1 + containers.length) % containers.length;
                        showModal(containers[currentImageIndex]);
                    } else if (e.key === 'Escape') {
                        modal.style.display = 'none';
                    }
                }
            });
            
            // スマホ：左右スワイプ対応
            let touchStartX = 0;
            let touchEndX = 0;
            
            modal.addEventListener('touchstart', (e) => {
                touchStartX = e.changedTouches[0].screenX;
            });
            
            modal.addEventListener('touchend', (e) => {
                touchEndX = e.changedTouches[0].screenX;
                handleSwipe();
            });
            
            function handleSwipe() {
                if (touchEndX < touchStartX - 50) {
                    currentImageIndex = (currentImageIndex + 1) % containers.length;
                    showModal(containers[currentImageIndex]);
                }
                if (touchEndX > touchStartX + 50) {
                    currentImageIndex = (currentImageIndex - 1 + containers.length) % containers.length;
                    showModal(containers[currentImageIndex]);
                }
            }

            document.addEventListener("DOMContentLoaded", function () {
                //　ハンバーガー
                const hamburger = document.querySelector(".hamburger");
                const topNav = document.querySelector(".top-nav");

                hamburger.addEventListener("click", function () {
                    hamburger.classList.toggle("open");
                    topNav.classList.toggle("open");
                });
            });

        </script>
    </body>
</html>
